### model
model_name_or_path: Qwen/Qwen3-8B

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 16
lora_dropout: 0.05

### dataset
dataset: data_instruction_10k_injected_Qwen_Qwen3-8B_lf
template: qwen
cutoff_len: 1024
overwrite_cache: false
preprocessing_num_workers: 16

### output
output_dir: saves/fids_multiseed/seed2
logging_steps: 50
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
seed: 2
data_seed: 2

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
